  <div class="container" style="padding-top:18px; padding-bottom:18px">
    <div class="page-header">
      <h1>AI Tutor</h1>
      <p>The tutor is built on a Vygotskian principle: it asks the questions a strong teacher would ask. It will not draft your essay for you.</p>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-messages" id="messages"></div>
    <div class="suggestion-chips" id="chips"></div>
    <form class="chat-input-row" id="form" autocomplete="off">
      <input id="input" placeholder="Ask the tutor a question — e.g., 'Help me strengthen my thesis…'" />
      <button class="btn btn-primary" type="submit">Send</button>
    </form>
  </div>

  <script src="js/app.js"></script>
  <script src="js/feedback-engine.js"></script>
  <script src="js/tutor.js"></script>
